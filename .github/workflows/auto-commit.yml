name: Manual Activity Timestamp

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-auto-commit-main
  cancel-in-progress: false

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Make a commit
        run: |
          git config user.email "amanbaba9404522@gmail.com"
          git config user.name "P-r-e-m-i-u-m"
          echo "$(date)" >> activity.log
          git add .
          git commit -m "Daily update: $(date)"
          git push
